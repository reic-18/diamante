<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffd6e8, #ffe6f2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 25px;
            width: 360px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 2px solid #ffb6d5;
        }

        h2 {
            text-align: center;
            color: #d63384;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #ffb6d5;
            outline: none;
        }

        input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 5px #ffb6d5;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff69b4;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #ff85c1;
        }

        .errorlist {
            color: red;
            font-size: 12px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2> Register Event </h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Submit</button>
    </form>

</div>

</body>
</html>
